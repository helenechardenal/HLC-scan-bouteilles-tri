<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HLC — Scan Bouteilles</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }
  header {
    width: 100%;
    background: #1a472a;
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header p { font-size: 13px; opacity: 0.8; }
  .container { width: 100%; max-width: 480px; padding: 20px 16px; }

  #scanner-box {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #dde3ea;
    margin-bottom: 20px;
  }
  #reader { width: 100%; }
  #reader video { width: 100% !important; }

  .btn-scan {
    width: 100%;
    padding: 16px;
    background: #1a472a;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-scan:active { opacity: 0.85; }
  .btn-scan.scanning { background: #c0392b; }

  .manual-section {
    background: white;
    border-radius: 12px;
    border: 1px solid #dde3ea;
    padding: 16px;
    margin-bottom: 20px;
  }
  .manual-section label {
    font-size: 13px;
    color: #666;
    display: block;
    margin-bottom: 8px;
  }
  .manual-row { display: flex; gap: 8px; }
  .manual-row input {
    flex: 1;
    padding: 12px;
    border: 1px solid #dde3ea;
    border-radius: 8px;
    font-size: 16px;
  }
  .manual-row button {
    padding: 12px 16px;
    background: #1a472a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  #result-card {
    border-radius: 16px;
    padding: 24px 20px;
    display: none;
    margin-bottom: 20px;
    border: 2px solid transparent;
  }
  #result-card.ok { background: #eafaf1; border-color: #27ae60; }
  #result-card.ko { background: #fdf0ed; border-color: #c0392b; }
  #result-card.warn { background: #fef9ec; border-color: #f39c12; }

  .result-icon { font-size: 48px; text-align: center; margin-bottom: 12px; }
  .result-status { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; }
  .result-status.ok { color: #1e8449; }
  .result-status.ko { color: #922b21; }
  .result-status.warn { color: #b7770d; }
  .result-ean { text-align: center; font-size: 13px; color: #888; margin-bottom: 16px; font-family: monospace; }

  .cluster-box {
    background: white;
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 8px;
  }
  .cluster-code { font-size: 28px; font-weight: 800; color: #1a472a; text-align: center; letter-spacing: 2px; }
  .cluster-name { font-size: 15px; color: #444; text-align: center; margin-top: 4px; }

  .btn-nouveau {
    width: 100%;
    padding: 14px;
    background: white;
    color: #1a472a;
    border: 2px solid #1a472a;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
  }
  .btn-nouveau.disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  #loading {
    display: none;
    text-align: center;
    padding: 24px;
    background: white;
    border-radius: 16px;
    margin-bottom: 20px;
    border: 1px solid #dde3ea;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #dde3ea;
    border-top-color: #1a472a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .config-section {
    background: white;
    border-radius: 12px;
    border: 1px solid #dde3ea;
    padding: 16px;
    margin-bottom: 20px;
  }
  .config-section summary { font-size: 13px; color: #888; cursor: pointer; user-select: none; }
  .config-section input {
    width: 100%;
    padding: 10px;
    border: 1px solid #dde3ea;
    border-radius: 8px;
    font-size: 13px;
    font-family: monospace;
    margin-top: 10px;
  }
  .config-section label { font-size: 12px; color: #aaa; display: block; margin-top: 8px; }
  .save-btn {
    margin-top: 10px;
    padding: 8px 14px;
    background: #1a472a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>HLC — Scan bouteilles</h1>
    <p>Scannez l'EAN pour connaître le cluster</p>
  </div>
</header>

<div class="container">



  <div id="scanner-box" style="display:none;">
    <div id="reader"></div>
  </div>

  <button class="btn-scan" id="btn-scan" onclick="toggleScanner()">
    📷 Scanner un code-barres
  </button>

  <div class="manual-section">
    <label>Ou saisir l'EAN manuellement</label>
    <div class="manual-row">
      <input type="number" id="ean-input" placeholder="Ex : 3456789012345" inputmode="numeric">
      <button onclick="searchEAN(document.getElementById('ean-input').value.trim())">OK</button>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p style="font-size:14px; color:#888;">Recherche en cours…</p>
  </div>

  <div id="result-card">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-status" id="result-status"></div>
    <div class="result-ean" id="result-ean"></div>
    <div class="cluster-box" id="cluster-box" style="display:none;">
      <div class="cluster-code" id="cluster-code"></div>
      <div class="cluster-name" id="cluster-name"></div>
    </div>
    <div id="nom-produit-box" style="display:none; margin-top:12px;">
      <label style="font-size:13px; color:#b7770d; display:block; margin-bottom:6px;">Nom du produit (obligatoire)</label>
      <input type="text" id="nom-produit-input" placeholder="Ex : Bière Goudale 75cl" style="width:100%; padding:12px; border:1px solid #f39c12; border-radius:8px; font-size:15px;">
    </div>
    <button class="btn-nouveau" id="btn-suivant" onclick="validerEtReset()">Scanner une autre bouteille</button>
  </div>

</div>

<script>
const BASE_ID = 'appYCPyz6WAq3v4tv';
const TBL_CLUSTERS = 'tblljgrrNaTFBj1ck';
const TBL_INCONNUS = 'tblEw7GxsKp6VZDhE';
const TBL_EAN_LOCAUX = 'tbl6zRpoCsnvsbHit';

function getConfig() {
  return {
    token: 'pat7EoZQvJBm41HRs.b858fb260b85b1db49ca0acd009c21cca857a0ca7477f084e932a1712531bf8f',
    base: 'appYCPyz6WAq3v4tv',
    tblEan: 'tblVAZSvxdUFDHjvY'
  };
}

let html5QrCode = null;
let isScanning = false;
let lastScanned = '';

function toggleScanner() {
  if (isScanning) { stopScanner(); } else { startScanner(); }
}

function startScanner() {
  document.getElementById('scanner-box').style.display = 'block';
  document.getElementById('btn-scan').textContent = '⏹ Arrêter le scan';
  document.getElementById('btn-scan').classList.add('scanning');
  isScanning = true;
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 280, height: 140 }, supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA] },
    (decodedText) => {
      if (decodedText !== lastScanned) {
        lastScanned = decodedText;
        stopScanner();
        searchEAN(decodedText);
      }
    },
    () => {}
  ).catch(() => {
    alert("Impossible d'accéder à la caméra. Vérifiez les autorisations.");
    stopScanner();
  });
}

function stopScanner() {
  if (html5QrCode && isScanning) { html5QrCode.stop().catch(() => {}); }
  document.getElementById('scanner-box').style.display = 'none';
  document.getElementById('btn-scan').textContent = '📷 Scanner un code-barres';
  document.getElementById('btn-scan').classList.remove('scanning');
  isScanning = false;
}

async function searchEAN(ean) {
  if (!ean || ean.length < 8) { alert('EAN invalide. Vérifiez le code.'); return; }
  const cfg = getConfig();

  showLoading(true);
  hideResult();
  try {
    // Recherche dans la table synchronisée
    const url1 = `https://api.airtable.com/v0/${cfg.base}/${cfg.tblEan}?filterByFormula=({Code EAN}="${ean}")&maxRecords=1`;
    const res1 = await fetch(url1, { headers: { Authorization: `Bearer ${cfg.token}` } });
    const data1 = await res1.json();

    // Recherche dans EAN locaux pour tri
    const url2 = `https://api.airtable.com/v0/${cfg.base}/${TBL_EAN_LOCAUX}?filterByFormula=({Code EAN}="${ean}")&maxRecords=1`;
    const res2 = await fetch(url2, { headers: { Authorization: `Bearer ${cfg.token}` } });
    const data2 = await res2.json();

    showLoading(false);

    const record = (data1.records && data1.records.length > 0) ? data1.records[0].fields :
                   (data2.records && data2.records.length > 0) ? data2.records[0].fields : null;

    if (record) {
      const statut = record['Statut tri'] || '';
      const clusterCode = record['Cluster'] || '';
      const clusterName = record['Référence'] || '';

      if (statut === 'Accepté') {
        showResult('ok', '✅', 'BOUTEILLE ACCEPTÉE', ean, clusterCode, clusterName);
      } else if (statut === 'A jeter') {
        showResult('ko', '❌', 'BOUTEILLE À JETER', ean, '', '');
      } else {
        showResult('warn', '⚠️', 'METTRE EN ZONE TEST', ean, '', '');
      }
    } else {
      await enregistrerInconnu(ean, cfg);
      showResult('warn', '⚠️', 'METTRE EN ZONE TEST', ean, '', '');
    }
  } catch(e) {
    showLoading(false);
    alert('Erreur de connexion. Vérifiez le réseau et la configuration.');
  }
}

async function fetchCluster(recordId, cfg) {
  try {
    const res = await fetch(`https://api.airtable.com/v0/${cfg.base}/${TBL_CLUSTERS}/${recordId}`, {
      headers: { Authorization: `Bearer ${cfg.token}` }
    });
    const data = await res.json();
    return {
      code: data.fields['Cluster'] || '',
      name: data.fields['Nom classique'] || ''
    };
  } catch(e) { return { code: '', name: '' }; }
}

async function enregistrerInconnu(ean, cfg) {
  try {
    const formula = encodeURIComponent(`({EAN scanné}="${ean}")`);
    const checkUrl = `https://api.airtable.com/v0/${cfg.base}/${TBL_INCONNUS}?filterByFormula=${formula}&maxRecords=1`;
    const checkRes = await fetch(checkUrl, { headers: { Authorization: `Bearer ${cfg.token}` } });
    const checkData = await checkRes.json();

    if (checkData.records && checkData.records.length > 0) {
      return;
    }

    const postRes = await fetch(`https://api.airtable.com/v0/${cfg.base}/${TBL_INCONNUS}`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${cfg.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        records: [{ fields: { 'Code EAN': ean, 'Date': new Date().toISOString().split('T')[0], 'Traité': false } }]
      })
    });
    const postData = await postRes.json();
    if (postData.error) { console.error('Airtable error:', postData.error); }
  } catch(e) { console.error('enregistrerInconnu error:', e); }
}

function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
}

function hideResult() {
  document.getElementById('result-card').style.display = 'none';
}

function showResult(type, icon, status, ean, clusterCode, clusterName) {
  const card = document.getElementById('result-card');
  card.className = '';
  card.classList.add(type);
  card.style.display = 'block';
  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-status').textContent = status;
  document.getElementById('result-status').className = 'result-status ' + type;
  document.getElementById('result-ean').textContent = 'EAN : ' + ean;
  const clusterBox = document.getElementById('cluster-box');
  if (clusterCode) {
    clusterBox.style.display = 'block';
    document.getElementById('cluster-code').textContent = clusterCode;
    document.getElementById('cluster-name').textContent = clusterName;
  } else {
    clusterBox.style.display = 'none';
  }
  lastScanned = '';

  const nomBox = document.getElementById('nom-produit-box');
  const nomInput = document.getElementById('nom-produit-input');
  const btnSuivant = document.getElementById('btn-suivant');
  nomInput.value = '';

  if (type === 'warn' && !clusterCode) {
    nomBox.style.display = 'block';
    btnSuivant.classList.add('disabled');
    nomInput.oninput = function() {
      if (nomInput.value.trim().length > 0) {
        btnSuivant.classList.remove('disabled');
      } else {
        btnSuivant.classList.add('disabled');
      }
    };
  } else {
    nomBox.style.display = 'none';
    btnSuivant.classList.remove('disabled');
  }

  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function validerEtReset() {
  const btnSuivant = document.getElementById('btn-suivant');
  if (btnSuivant.classList.contains('disabled')) {
    alert('Veuillez saisir le nom du produit avant de continuer.');
    return;
  }

  const nomInput = document.getElementById('nom-produit-input');
  const nom = nomInput.value.trim();

  if (nom) {
    const cfg = getConfig();
    const ean = document.getElementById('result-ean').textContent.replace('EAN : ', '').trim();
    try {
      await fetch(`https://api.airtable.com/v0/${cfg.base}/${TBL_INCONNUS}?filterByFormula=${encodeURIComponent(`({EAN scanné}="${ean}")`)}`, {
        method: 'GET',
        headers: { Authorization: `Bearer ${cfg.token}` }
      }).then(r => r.json()).then(async data => {
        if (data.records && data.records.length > 0) {
          const recordId = data.records[0].id;
          await fetch(`https://api.airtable.com/v0/${cfg.base}/${TBL_INCONNUS}/${recordId}`, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${cfg.token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: { 'Référence': nom } })
          });
        }
      });
    } catch(e) {}
  }

  reset();
}

function reset() {
  hideResult();
  document.getElementById('ean-input').value = '';
  document.getElementById('nom-produit-input').value = '';
  document.getElementById('nom-produit-box').style.display = 'none';
  lastScanned = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
